# pipeline.conf — which network drives each stage. Swap a backend = change one line.
# Uses `: "${VAR:=default}"` so any value can be overridden from the environment:
#   SEGMENT=u2net MULTIVIEW=none ./pipeline.sh
#
# This loose, config-selected design is deliberate "for now": while we're trying
# many networks, an interchangeable-executable-behind-a-file-contract harness beats
# a compiled monolith. Each backend is a stages/<stage>.<backend>.sh adapter.

: "${NAME:=fastener}"                 # run name → out/<NAME>/
: "${INPUT:=../IMG_2743.heic}"        # any image sips can read (.heic/.jpg/.png)

# --- stage backends (the swap points) ---
: "${DETECT:=manual}"                 # owlvit | grounded_sam | manual   (text → object box)
: "${SEGMENT:=manual}"                # mobilesam | fastsam | u2net | manual  (→ object-on-white)
: "${MULTIVIEW:=zero123plus}"         # zero123plus | none               (object → 6 views)

# --- stage params ---
: "${PROMPT:=screw. bolt.}"           # DETECT open-vocab labels
: "${BOX:=}"                          # DETECT=manual: "x0 y0 x1 y1" px (empty = centered square)
: "${CROP:=1700}"                     # manual centered-crop square size (px), pre-matte
: "${CONDPX:=256}"                    # zero123plus VAE-encode res (512 = full, ~10min)
